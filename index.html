<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rabbit AR</title>
  <!-- Подключаем model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body style="margin:0; overflow:hidden;">

  <!-- Модель кролика -->
  <model-viewer 
      id="model"
      src="animation3.glb"
      environment-image="light.hdr"
      camera-controls
      autoplay
      animation-name="Action1"
      shadow-intensity="1"
      style="width: 100%; height: 100vh;">
  </model-viewer>

  <!-- Кнопка для смены анимации -->
  <button onclick="switchAnim()" style="position: absolute; top: 20px; left: 20px; z-index: 10; padding:10px 15px; font-size:16px;">
    Сменить анимацию
  </button>

  <script>
    async function switchAnim() {
      const model = document.getElementById('model');
      model.pause();
      model.animationName = "Action2";      // Вторая анимация
      await model.modelLoaded;
      model.play({crossFadeDuration: 0.5});  // Плавный переход
    }
  </script>

</body>
</html>
