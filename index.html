<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rabbit AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>

<model-viewer 
    src="animation3.glb"
    environment-image="light.hdr"
    camera-controls
    autoplay
    animation-name="Action1"
    shadow-intensity="1"
    style="width: 100%; height: 100vh;">
</model-viewer>

<button onclick="switchAnim()" style="position: absolute; top: 20px; left: 20px; z-index: 10;">
  Сменить анимацию
</button>

<script>
  async function switchAnim() {
    const model = document.querySelector('model-viewer');
    model.pause();
    model.animationName = "Action2";
    await model.modelLoaded;
    model.play({crossFadeDuration: 0.5});
  }
</script>

</body>
</html>
